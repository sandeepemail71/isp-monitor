## ─────────────────────────────────────────────
##  Home ISP Monitor — Configuration File
##  Edit this file BEFORE running install.sh
## ─────────────────────────────────────────────

isp:
  ping_targets:
    - "8.8.8.8" # Google DNS
    - "1.1.1.1" # Cloudflare DNS
  ping_interval_seconds: 10
  outage_threshold_ms: 2000 # RTT above this (ms) is considered degraded
  ping_loss_threshold_pct: 20 # Packet loss above this % triggers outage
  speedtest_interval_minutes: 60
  speedtest_server_id:           # Pin to a specific server ID (leave blank for auto)
  speed_alert_threshold_mbps: 30 # Telegram alert if download drops below this
  http_check_interval_seconds: 60
  http_check_urls:
    - "https://www.google.com"
    - "https://www.cloudflare.com"
    - "https://www.github.com"

influxdb:
  host: "localhost"
  port: 8086
  database: "home_monitoring"

telegram:
  enabled: true
  bot_token: "YOUR_BOT_TOKEN"   # Get from @BotFather on Telegram
  chat_id: "YOUR_CHAT_ID"       # Get from @userinfobot on Telegram

email:
  enabled: false
  smtp_host: "smtp.gmail.com"
  smtp_port: 587
  sender: "you@gmail.com"
  app_password: "YOUR_APP_PASSWORD"  # Gmail → Settings → App Passwords
  recipient: "you@gmail.com"
